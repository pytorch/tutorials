name: Claude Code

on:
  issue_comment:
    types: [created]
  issues:
    types: [opened]

permissions:
  contents: read
  pull-requests: write
  issues: write
  id-token: write

jobs:
  claude-code:
    uses: pytorch/test-infra/.github/workflows/_claude-code.yml@main
    secrets: inherit
    with:
      setup_script: |
        pip install lintrunner==0.12.5
        lintrunner init
